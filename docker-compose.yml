# Teste local: na pasta do repositório rode: docker compose up --build
# Swagger: http://localhost:8080/swagger

services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "DesafioLocal1!"
    ports:
      - "14333:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "DesafioLocal1!" -C -Q "SELECT 1" || exit 1
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      sql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sql,1433;Database=Mirante;User Id=sa;Password=DesafioLocal1!;TrustServerCertificate=True;MultipleActiveResultSets=True;"
      APPLY_MIGRATIONS_AT_STARTUP: "true"
